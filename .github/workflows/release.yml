name: Build Millumin Scripts Installer

on:
    push:
        branches:
            - master
        paths:
            - "scripts/**"
            - "build.sh"

    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        runs-on: macos-latest

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Install dependencies
              run: |
                  brew install jq

            - name: Make build script executable
              run: chmod +x installer/build.sh

            - name: Run build
              run: ./installer/build.sh

            # -------------------------
            # IMPORT CERTIFICATE
            # -------------------------
            - name: Import certificate
              env:
                  MAC_CERTIFICATE: ${{ secrets.MAC_CERTIFICATE }}
                  MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
              run: |
                  echo "$MAC_CERTIFICATE" | base64 --decode > cert.p12

                  security create-keychain -p "" build.keychain
                  security default-keychain -s build.keychain
                  security unlock-keychain -p "" build.keychain

                  security import cert.p12 \
                      -k build.keychain \
                      -P "$MAC_CERTIFICATE_PASSWORD" \
                      -T /usr/bin/productsign \
                      -T /usr/bin/codesign

                  security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

            # -------------------------
            # SIGN PACKAGE
            # -------------------------
            - name: Sign package
              env:
                  DEVELOPER_ID_INSTALLER: ${{ secrets.DEVELOPER_ID_INSTALLER }}
              run: |
                  productsign \
                      --sign "$DEVELOPER_ID_INSTALLER" \
                      installer/build/dist/Millumin-Scripts.pkg \
                      installer/build/dist/Millumin-Scripts-signed.pkg

            # -------------------------
            # VERSION
            # -------------------------
            - name: Get version
              id: version
              run: |
                  echo "VERSION=$(date +%Y.%m.%d.%H%M)" >> $GITHUB_OUTPUT

            # -------------------------
            # RELEASE
            # -------------------------
            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ steps.version.outputs.VERSION }}
                  name: Millumin Scripts v${{ steps.version.outputs.VERSION }}
                  files: |
                      installer/build/dist/Millumin-Scripts-signed.pkg
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}