name: Build Millumin Scripts Installer

on:
    push:
        branches:
            - master
        paths:
            - "scripts/**"
            - "build.sh"

    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        runs-on: macos-latest

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Install dependencies
              run: |
                  brew install jq

            - name: Make build script executable
              run: chmod +x installer/build.sh

            - name: Run build
              run: ./installer/build.sh

            # -------------------------
            # IMPORT CERTIFICATE
            # -------------------------
            - name: Import certificate
              env:
                  MAC_CERTIFICATE: ${{ secrets.MAC_CERTIFICATE }}
                  MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
              run: |
                  echo "$MAC_CERTIFICATE" | base64 --decode > cert.p12

                  security create-keychain -p "" build.keychain
                  security default-keychain -s build.keychain
                  security unlock-keychain -p "" build.keychain

                  security import cert.p12 \
                      -k build.keychain \
                      -P "$MAC_CERTIFICATE_PASSWORD" \
                      -T /usr/bin/productsign \
                      -T /usr/bin/codesign

                  security set-key-partition-list \
                      -S apple-tool:,apple: \
                      -s -k "" build.keychain

            # -------------------------
            # DEBUG IDENTITIES
            # -------------------------
            - name: List identities
              run: security find-identity -v -p basic

            # -------------------------
            # SIGN PACKAGE
            # -------------------------
            - name: Sign package
              run: |
                  IDENTITY=$(security find-identity -v -p basic | grep "Developer ID Installer" | head -1 | sed 's/.*"\(.*\)".*/\1/')

                  echo "Using identity: $IDENTITY"

                  productsign \
                      --sign "$IDENTITY" \
                      installer/build/dist/Millumin-Scripts-Unsigned.pkg \
                      installer/build/dist/Millumin-Scripts.pkg

            # -------------------------
            # WRITE APPLE API KEY (DEBUG SAFE)
            # -------------------------
            - name: Write key (debug safe)
              env:
                  ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
              run: |
                  echo "$ASC_PRIVATE_KEY" > AuthKey.p8
                  echo "File preview:"
                  head -n 2 AuthKey.p8

            # -------------------------
            # NOTARIZE PACKAGE
            # -------------------------
            - name: Notarize package
              env:
                  ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
                  ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
              run: |
                  set -e

                  # sanity check
                  if ! grep -q "BEGIN PRIVATE KEY" AuthKey.p8; then
                    echo "❌ Invalid .p8 format (not PEM)"
                    exit 1
                  fi

                  xcrun notarytool submit \
                      installer/build/dist/Millumin-Scripts.pkg \
                      --key AuthKey.p8 \
                      --key-id "$ASC_KEY_ID" \
                      --issuer "$ASC_ISSUER_ID" \
                      --wait

                  echo "Notarization completed"

                  rm AuthKey.p8

            # -------------------------
            # STAPLE NOTARIZATION
            # -------------------------
            - name: Staple notarization
              run: |
                  xcrun stapler staple installer/build/dist/Millumin-Scripts.pkg

            # -------------------------
            # VERSION
            # -------------------------
            - name: Get version
              id: version
              run: |
                  echo "VERSION=$(date +%Y.%m.%d.%H%M)" >> $GITHUB_OUTPUT

            # -------------------------
            # RELEASE
            # -------------------------
            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ steps.version.outputs.VERSION }}
                  name: Millumin Scripts v${{ steps.version.outputs.VERSION }}
                  files: |
                      installer/build/dist/Millumin-Scripts.pkg
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}